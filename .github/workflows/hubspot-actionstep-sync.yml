name: HubSpot → ActionStep sync

on:
  schedule:
    # 14:00 UTC ≈ 00:00 Brisbane (AEST, UTC+10). Adjust if your day boundary differs.
    - cron: "0 14 * * *"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Report actions without writing to ActionStep"
        type: boolean
        default: false

# Serialise runs so the state.json commit-back never races.
concurrency:
  group: hubspot-actionstep-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: hubspot-actionstep-sync
        run: pip install -r requirements.txt

      - name: Run sync
        working-directory: hubspot-actionstep-sync
        env:
          ZAPIER_MCP_API_KEY: ${{ secrets.ZAPIER_MCP_API_KEY }}
          HUBSPOT_TOKEN: ${{ secrets.HUBSPOT_TOKEN }}
        run: |
          python sync.py ${{ github.event.inputs.dry_run == 'true' && '--dry-run' || '' }}

      - name: Commit state
        if: ${{ github.event.inputs.dry_run != 'true' }}
        run: |
          if [ -n "$(git status --porcelain hubspot-actionstep-sync/state.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add hubspot-actionstep-sync/state.json
            git commit -m "data: hubspot-actionstep sync state $(date -u +%Y-%m-%dT%H:%MZ)"
            git push
          else
            echo "No state change to commit."
          fi
